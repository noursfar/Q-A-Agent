server {
    listen 80;

    server_name _;

    # Point to Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # Reverse proxy /chat to the AI backend
    location /chat {
        # Using a variable forces Nginx to resolve the host dynamically when a request is made,
        # rather than failing at startup if the container isn't running yet.
        set $ai_upstream http://ai:3000;
        proxy_pass $ai_upstream;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
    }
}
